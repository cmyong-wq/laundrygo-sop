    <!-- Firebase SDK (Google 소셜 로그인) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZviv3Nc1I4rL7VGhdEP9ozbupSu-R45I",
            authDomain: "laundrygo-sop.firebaseapp.com",
            projectId: "laundrygo-sop",
            storageBucket: "laundrygo-sop.firebasestorage.app",
            messagingSenderId: "244997131170",
            appId: "1:244997131170:web:1f70864631e02b5b8dc0fb"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window._db   = db;
        window._auth = auth;

        // ── 인증 상태 변화 감지 ──────────────────────────────
        onAuthStateChanged(auth, async (user) => {
            window._currentUser = user;

            if (user) {
                // 로그인 성공 → 뷰어 권한 확인
                const allowed = await checkViewerAccess(user.email);
                if (!allowed) {
                    // 접근 권한 없음 → 안내 후 로그아웃
                    showAuthScreen('denied', user.email);
                    await signOut(auth);
                    return;
                }

                // 편집자 여부 판별
                const isEditor = (window._editorEmails || []).includes(user.email);
                window._isEditor = isEditor;

                // UI 업데이트
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('user-badge').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.displayName || user.email;
                document.getElementById('user-avatar').src =
                    user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.email)}&background=4f46e5&color=fff`;

                if (isEditor) {
                    document.getElementById('edit-mode-btn').classList.remove('hidden');
                    document.getElementById('role-badge').innerText = '✏️ 편집자';
                    document.getElementById('role-badge').className =
                        'text-[10px] font-bold px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-700';
                } else {
                    document.getElementById('edit-mode-btn').classList.add('hidden');
                    document.getElementById('role-badge').innerText = '👁 뷰어';
                    document.getElementById('role-badge').className =
                        'text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-500';
                }

                loadSOPFromFirestore();
                listenSOPChanges();

            } else {
                showAuthScreen('login');
                document.getElementById('user-badge').classList.add('hidden');
            }
        });

        // ── 뷰어 접근 허용 여부 확인 (Firestore allowedEmails 컬렉션) ──
        async function checkViewerAccess(email) {
            // 편집자는 항상 통과
            if ((window._editorEmails || []).includes(email)) return true;
            try {
                const ref = doc(db, 'access', 'viewers');
                const snap = await getDoc(ref);
                if (!snap.exists()) return false;
                const list = snap.data().emails || [];
                return list.includes(email);
            } catch(e) {
                console.error('접근 권한 확인 실패:', e);
                return false;
            }
        }

        // ── 화면 전환 ──────────────────────────────────────
        function showAuthScreen(state, email = '') {
            const modal = document.getElementById('auth-modal');
            modal.classList.remove('hidden');
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-denied').classList.add('hidden');

            if (state === 'login') {
                document.getElementById('screen-login').classList.remove('hidden');
            } else if (state === 'denied') {
                document.getElementById('denied-email').innerText = email;
                document.getElementById('screen-denied').classList.remove('hidden');
            }
        }

        // ── 구글 로그인 ────────────────────────────────────
        window.doGoogleLogin = async function() {
            const btn = document.getElementById('google-login-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 로그인 중...';
            try {
                await signInWithPopup(auth, provider);
            } catch(e) {
                btn.disabled = false;
                btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4"> Google 계정으로 로그인';
                if (e.code !== 'auth/popup-closed-by-user') {
                    window.showCustomToast('로그인 오류: ' + e.message);
                }
            }
        };

        // ── 로그아웃 ───────────────────────────────────────
        window.doLogout = async function() {
            await signOut(auth);
            window.showCustomToast('로그아웃되었습니다.');
        };

        // ── Firestore SOP 로드 ─────────────────────────────
        window.loadSOPFromFirestore = async function() {
            try {
                const snap = await getDoc(doc(db, 'sop', 'main'));
                if (snap.exists() && snap.data().sopData) {
                    window.sopData = snap.data().sopData;
                    window.renderAsideMenu && window.renderAsideMenu();
                    window.renderActiveSlide && window.renderActiveSlide();
                    window.showCustomToast('✅ 최신 SOP를 불러왔습니다.');
                } else {
                    await window.saveSOPToFirestore();
                }
            } catch(e) {
                window.showCustomToast('⚠️ 데이터 로드 실패. 기본 데이터로 표시합니다.');
                window.renderAsideMenu && window.renderAsideMenu();
                window.renderActiveSlide && window.renderActiveSlide();
            }
        };

        // ── Firestore SOP 저장 ─────────────────────────────
        window.saveSOPToFirestore = async function() {
            if (!window._isEditor) {
                window.showCustomToast('⛔ 편집 권한이 없습니다.');
                return;
            }
            try {
                await setDoc(doc(db, 'sop', 'main'), {
                    sopData: window.sopData,
                    updatedAt: new Date().toISOString(),
                    updatedBy: window._currentUser?.email || 'unknown'
                });
                window.showCustomToast('✅ 저장 완료! 모든 사용자에게 즉시 반영됩니다.');
            } catch(e) {
                window.showCustomToast('⚠️ 저장 실패: ' + e.message);
            }
        };

        // ── 실시간 변경 감지 ───────────────────────────────
        window.listenSOPChanges = function() {
            onSnapshot(doc(db, 'sop', 'main'), (snap) => {
                if (snap.exists() && snap.data().sopData && !window._isEditing) {
                    window.sopData = snap.data().sopData;
                    window.renderAsideMenu && window.renderAsideMenu();
                    window.renderActiveSlide && window.renderActiveSlide();
                }
            });
        };
    </script>

    function showCustomToast(message) {

        toast.style.transform = "translateY(0)";

    // 화면 비율 맞춤 자동 크기 조정 (Auto Scaling) 로직
    function adjustWindowScale() {
        const wrapper = document.querySelector('.presentation-wrapper');
        const targetWidth = 1280;
        const targetHeight = 720;
        
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        
        // 16:9 비율 유지하면서 가로, 세로 영역 중 작은 쪽의 배율에 맞추어 완전 축소/확대
        const scale = Math.min(windowWidth / targetWidth, windowHeight / targetHeight);
        
        wrapper.style.transform = `scale(${scale})`;
        wrapper.style.transformOrigin = 'center center';
    }

    // 편집상태에 따라 contenteditable 속성과 스타일을 주입하는 핵심 헬퍼 함수
    function editableAttr(type, index1 = null, index2 = null) {
        if (!isEditMode) return '';
        
        let onblurAction = '';
        if (type === 'title') onblurAction = `updateSOPField('title', this.innerText)`;
        else if (type === 'objective') onblurAction = `updateSOPField('objective', this.innerText)`;
        else if (type === 'stepTitle') onblurAction = `updateSOPStep(${index1}, 'title', this.innerText)`;
        else if (type === 'stepDesc') onblurAction = `updateSOPStep(${index1}, 'desc', this.innerText)`;
        else if (type === 'tableTitle') onblurAction = `updateSOPTableTitle(this.innerText)`;
        else if (type === 'tableHeader') onblurAction = `updateSOPTableHeader(${index1}, this.innerText)`;
        else if (type === 'tableCell') onblurAction = `updateSOPTableCell(${index1}, ${index2}, this.innerText)`;
        else if (type === 'attention') onblurAction = `updateSOPAttention(${index1}, this.innerText)`;

        return `contenteditable="true" class="editable-active-style outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white hover:bg-slate-100 border border-dashed border-indigo-300 rounded px-1 transition duration-150" onblur="${onblurAction}"`;
    }

    function exportModifiedHTML() {
        const originalHtml = document.documentElement.outerHTML;
        const startMarker = "/* START_SOP_DATA */";
        const endMarker = "/* END_SOP_DATA */";
        
        const startIndex = originalHtml.indexOf(startMarker);
        const endIndex = originalHtml.indexOf(endMarker);

        if (startIndex !== -1 && endIndex !== -1) {
            const before = originalHtml.substring(0, startIndex + startMarker.length);
            const after = originalHtml.substring(endIndex);
            
            // 데이터 직렬화 시 들여쓰기를 살려서 정돈된 코드 생성
            const updatedDataScript = `\n    const sopData = ${JSON.stringify(sopData, null, 8)};\n    `;
            
            // DOCTYPE 수동 추가 복구
            const finalHtml = "<!DOCTYPE html>\n" + before + updatedDataScript + after;
            
            // 파일 다운로드 브라우저 트리거
            const blob = new Blob([finalHtml], { type: "text/html;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "laundry_sop_handbook_edited.html";
            link.click();
            showCustomToast("수정된 가이드라인 SOP 파일이 성공적으로 생성 및 다운로드되었습니다.");
        } else {
            showCustomToast("SOP 원본 데이터 구역의 인덱스 마킹이 유실되어 파일 저장에 실패했습니다.");

    }

        if (event.key === "ArrowRight" || event.key === "39") {

    window.onload = function() {
        adjustWindowScale();
        // Firebase 로그인 후 데이터 로드되면 자동 렌더링됨
        // 비로그인 상태에서는 로그인 모달이 표시됨
    };

    window.addEventListener('resize', adjustWindowScale);
</script>

</body>
