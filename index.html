// ═══════════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════════
let isEditMode = false;
let activeTeamId = null;
let activeSopId = null;
window._isEditor = false;
window._isEditing = false;

// ═══════════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════════
function uid() { return 'id-' + Math.random().toString(36).substr(2, 9); }

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
window.showCustomToast = showToast;

function getTeam(teamId) { return window.sopData.find(t => t.id === teamId); }
function getSop(teamId, sopId) {
    const team = getTeam(teamId);
    return team ? team.sops.find(s => s.id === sopId) : null;
}

// ═══════════════════════════════════════════════
// 사이드바 렌더
// ═══════════════════════════════════════════════
function renderSidebar() {
    const sb = document.getElementById('sidebar');
    sb.innerHTML = '';
    window.sopData.forEach(team => {
        const isOpen = team.id === activeTeamId;
        const teamEl = document.createElement('div');
        teamEl.className = 'team-block';
        teamEl.innerHTML = `
            <div class="team-header flex items-center justify-between px-3 py-2.5 cursor-pointer hover:bg-slate-50 border-b border-slate-100 group"
                 onclick="toggleTeam('${team.id}')">
                <div class="flex items-center gap-2 min-w-0">
                    <div class="w-2 h-2 rounded-full flex-shrink-0 team-color-${team.colorIndex}"></div>
                    <span class="text-xs font-bold text-slate-700 truncate">${team.teamName}</span>
                    <span class="text-[10px] text-slate-400 ml-1">${team.sops.length}</span>
                </div>
                <div class="flex items-center gap-1">
                    ${isEditMode ? `
                    <button onclick="event.stopPropagation(); renameTeam('${team.id}')" class="opacity-0 group-hover:opacity-100 btn-ghost py-0.5 px-1.5" title="이름 변경">
                        <i class="fa-solid fa-pen text-[10px]"></i>
                    </button>
                    <button onclick="event.stopPropagation(); deleteTeam('${team.id}')" class="opacity-0 group-hover:opacity-100 btn-danger py-0.5 px-1.5" title="팀 삭제">
                        <i class="fa-solid fa-trash text-[10px]"></i>
                    </button>` : ''}
                    <i class="fa-solid fa-chevron-${isOpen ? 'down' : 'right'} text-slate-400 text-[10px] ml-1"></i>
                </div>
            </div>`;

        // SOP 목록
        if (isOpen) {
            const sopList = document.createElement('div');
            sopList.className = 'sop-list bg-slate-50';
            team.sops.forEach(sop => {
                const isActive = sop.id === activeSopId;
                const item = document.createElement('div');
                item.className = `sop-item flex items-center justify-between px-3 py-2 cursor-pointer border-b border-slate-100 group ${isActive ? 'active team-border-' + team.colorIndex : ''}`;
                item.onclick = () => selectSop(team.id, sop.id);
                item.innerHTML = `
                    <div class="min-w-0 flex-1">
                        <div class="text-[10px] team-text-${team.colorIndex} font-bold">${sop.sopCode}</div>
                        <div class="text-xs text-slate-700 truncate">${sop.title}</div>
                    </div>
                    ${isEditMode ? `
                    <button onclick="event.stopPropagation(); deleteSop('${team.id}','${sop.id}')" class="opacity-0 group-hover:opacity-100 btn-danger py-0.5 px-1.5 ml-1 flex-shrink-0" title="삭제">
                        <i class="fa-solid fa-trash text-[10px]"></i>
                    </button>` : ''}`;
                sopList.appendChild(item);
            });

            // SOP 추가 버튼 (편집 모드)
            if (isEditMode) {
                const addBtn = document.createElement('div');
                addBtn.className = 'px-3 py-2 flex items-center gap-1.5 cursor-pointer hover:bg-slate-100 text-indigo-500 border-b border-slate-100';
                addBtn.onclick = () => addSop(team.id);
                addBtn.innerHTML = `<i class="fa-solid fa-plus text-[10px]"></i><span class="text-xs font-semibold">SOP 추가</span>`;
                sopList.appendChild(addBtn);
            }

            teamEl.appendChild(sopList);
        }
        sb.appendChild(teamEl);
    });
}

// ═══════════════════════════════════════════════
// 콘텐츠 렌더
// ═══════════════════════════════════════════════
function renderContent() {
    const area = document.getElementById('content-area');
    if (!activeTeamId || !activeSopId) {
        area.innerHTML = `<div class="flex items-center justify-center h-full text-slate-400 text-center">
            <div><i class="fa-solid fa-arrow-left text-3xl mb-3 opacity-30"></i><p class="text-sm">왼쪽에서 SOP를 선택하세요</p></div>
        </div>`;
        return;
    }
    const team = getTeam(activeTeamId);
    const sop = getSop(activeTeamId, activeSopId);
    if (!team || !sop) return;

    const c = team.colorIndex;
    const edit = isEditMode && window._isEditor;
    const editAttr = edit ? 'contenteditable="true" class="edit-highlight rounded px-0.5"' : '';

    // 스텝 HTML
    const stepsHTML = sop.steps.map((s, i) => `
        <div class="flex items-start gap-3 p-2.5 rounded-lg ${i % 2 === 0 ? 'bg-slate-50' : 'bg-white'} border border-slate-100 group">
            <div class="step-num team-color-${c} mt-0.5">${i + 1}</div>
            <div class="flex-1 min-w-0">
                <div class="text-xs font-bold text-slate-800" ${edit ? `contenteditable="true" data-field="step-title" data-team="${activeTeamId}" data-sop="${activeSopId}" data-idx="${i}" onblur="saveField(this,'step-title','${activeTeamId}','${activeSopId}',${i})"` : ''}>${s.title}</div>
                <div class="text-[11px] text-slate-500 mt-0.5" ${edit ? `contenteditable="true" data-field="step-desc" onblur="saveField(this,'step-desc','${activeTeamId}','${activeSopId}',${i})"` : ''}>${s.desc}</div>
            </div>
            ${edit ? `<button onclick="deleteStep('${activeTeamId}','${activeSopId}',${i})" class="opacity-0 group-hover:opacity-100 btn-danger py-0.5 px-1.5 flex-shrink-0 mt-0.5"><i class="fa-solid fa-trash text-[10px]"></i></button>` : ''}
        </div>`).join('');

    // 테이블 HTML
    const tblHeadersHTML = sop.table.headers.map((h, i) => `
        <th class="px-3 py-2 text-left text-[11px] font-bold text-white" ${edit ? `contenteditable="true" onblur="saveTableHeader(this,'${activeTeamId}','${activeSopId}',${i})"` : ''}>${h}</th>`).join('');

    const tblRowsHTML = sop.table.rows.map((row, ri) => `
        <tr class="${ri % 2 === 0 ? 'bg-white' : 'bg-slate-50'} group">
            ${row.map((cell, ci) => `
            <td class="px-3 py-2 text-[11px] text-slate-700 border-b border-slate-100" ${edit ? `contenteditable="true" onblur="saveTableCell(this,'${activeTeamId}','${activeSopId}',${ri},${ci})"` : ''}>${cell}</td>`).join('')}
            ${edit ? `<td class="px-2 py-1 border-b border-slate-100"><button onclick="deleteTableRow('${activeTeamId}','${activeSopId}',${ri})" class="opacity-0 group-hover:opacity-100 btn-danger py-0.5 px-1.5"><i class="fa-solid fa-trash text-[9px]"></i></button></td>` : ''}
        </tr>`).join('');

    area.innerHTML = `
        <div class="p-6 max-w-3xl mx-auto">

            <!-- 헤더 -->
            <div class="team-color-${c} rounded-xl px-6 py-4 mb-5 flex items-center justify-between">
                <div>
                    <div class="text-white/70 text-[11px] font-bold tracking-wider mb-1">${team.teamName} · <span ${edit ? `contenteditable="true" class="edit-highlight rounded" onblur="saveField(this,'sopCode','${activeTeamId}','${activeSopId}',-1)"` : ''}>${sop.sopCode}</span></div>
                    <div class="text-white text-xl font-black" ${edit ? `contenteditable="true" onblur="saveField(this,'title','${activeTeamId}','${activeSopId}',-1)"` : ''}>${sop.title}</div>
                </div>
                ${edit ? `<div class="flex gap-2">
                    <button onclick="addStep('${activeTeamId}','${activeSopId}')" class="bg-white/20 hover:bg-white/30 text-white text-xs px-3 py-1.5 rounded-lg font-semibold transition">
                        <i class="fa-solid fa-plus mr-1"></i>단계 추가
                    </button>
                </div>` : ''}
            </div>

            <!-- 목적 -->
            <div class="bg-white rounded-xl border border-slate-200 p-4 mb-4">
                <div class="text-xs font-bold team-text-${c} mb-1.5">▶ 목적</div>
                <div class="text-xs text-slate-600 leading-relaxed" ${edit ? `contenteditable="true" onblur="saveField(this,'objective','${activeTeamId}','${activeSopId}',-1)"` : ''}>${sop.objective}</div>
            </div>

            <!-- 작업 단계 -->
            <div class="bg-white rounded-xl border border-slate-200 p-4 mb-4">
                <div class="text-xs font-bold team-text-${c} mb-3">▶ 작업 단계</div>
                <div class="flex flex-col gap-2" id="steps-list">${stepsHTML}</div>
            </div>

            <!-- 기준 테이블 -->
            <div class="bg-white rounded-xl border border-slate-200 p-4 mb-4">
                <div class="flex items-center justify-between mb-3">
                    <div class="text-xs font-bold team-text-${c}" ${edit ? `contenteditable="true" onblur="saveField(this,'tableTitle','${activeTeamId}','${activeSopId}',-1)"` : ''}>▶ ${sop.table.title}</div>
                    ${edit ? `<div class="flex gap-2">
                        <button onclick="addTableCol('${activeTeamId}','${activeSopId}')" class="btn-ghost"><i class="fa-solid fa-plus mr-1 text-[10px]"></i>열 추가</button>
                        <button onclick="addTableRow('${activeTeamId}','${activeSopId}')" class="btn-ghost"><i class="fa-solid fa-plus mr-1 text-[10px]"></i>행 추가</button>
                    </div>` : ''}
                </div>
                <div class="overflow-x-auto rounded-lg border border-slate-200">
                    <table class="w-full text-left border-collapse">
                        <thead><tr class="team-color-${c}">${tblHeadersHTML}${edit ? '<th class="w-8"></th>' : ''}</tr></thead>
                        <tbody>${tblRowsHTML}</tbody>
                    </table>
                </div>
            </div>

            <!-- 주의사항 -->
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4">
                <div class="flex items-start gap-2">
                    <i class="fa-solid fa-triangle-exclamation text-amber-500 mt-0.5 flex-shrink-0"></i>
                    <div class="text-xs text-amber-800 leading-relaxed" ${edit ? `contenteditable="true" onblur="saveField(this,'attention','${activeTeamId}','${activeSopId}',-1)"` : ''}>${sop.attention}</div>
                </div>
            </div>

        </div>`;
}

// ═══════════════════════════════════════════════
// 액션
// ═══════════════════════════════════════════════
function toggleTeam(teamId) {
    if (activeTeamId === teamId) {
        activeTeamId = null;
        activeSopId = null;
    } else {
        activeTeamId = teamId;
        activeSopId = null;
    }
    renderSidebar();
    renderContent();
}

function selectSop(teamId, sopId) {
    activeTeamId = teamId;
    activeSopId = sopId;
    renderSidebar();
    renderContent();
}

function toggleEditMode() {
    if (!window._isEditor) {
        showToast('⛔ 편집 권한이 없습니다.');
        return;
    }
    isEditMode = !isEditMode;
    window._isEditing = isEditMode;
    document.getElementById('edit-mode-text').innerText = isEditMode ? '편집 모드 종료' : '편집 모드 활성화';
    document.getElementById('edit-mode-btn').className = isEditMode
        ? 'bg-rose-600 hover:bg-rose-700 text-white font-bold text-xs px-3.5 py-1.5 rounded-lg flex items-center gap-1.5 transition'
        : 'bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-3.5 py-1.5 rounded-lg flex items-center gap-1.5 transition';
    const saveBtn = document.getElementById('save-btn');
    saveBtn.classList.toggle('hidden', !isEditMode);
    saveBtn.classList.toggle('flex', isEditMode);
    document.getElementById('add-team-btn').classList.toggle('hidden', !isEditMode);
    renderSidebar();
    renderContent();
}

// ── 팀 추가/삭제/이름변경 ──────────────────────
function addTeam() {
    showModal('새 팀 이름을 입력하세요', '', (name) => {
        if (!name.trim()) return;
        const colors = [0,1,2,3];
        const usedColors = window.sopData.map(t => t.colorIndex);
        const freeColor = colors.find(c => !usedColors.includes(c)) ?? window.sopData.length % 4;
        window.sopData.push({ id: uid(), teamName: name.trim(), colorIndex: freeColor, sops: [] });
        renderSidebar();
        showToast('✅ 팀이 추가되었습니다.');
    });
}

function renameTeam(teamId) {
    const team = getTeam(teamId);
    showModal('팀 이름 변경', team.teamName, (name) => {
        if (!name.trim()) return;
        team.teamName = name.trim();
        renderSidebar();
        showToast('✅ 팀 이름이 변경되었습니다.');
    });
}

function deleteTeam(teamId) {
    const team = getTeam(teamId);
    if (!confirm(`"${team.teamName}" 팀과 모든 SOP를 삭제하시겠습니까?`)) return;
    window.sopData = window.sopData.filter(t => t.id !== teamId);
    if (activeTeamId === teamId) { activeTeamId = null; activeSopId = null; }
    renderSidebar();
    renderContent();
    showToast('🗑 팀이 삭제되었습니다.');
}

// ── SOP 추가/삭제 ──────────────────────────────
function addSop(teamId) {
    showModal('새 SOP 제목을 입력하세요', '', (title) => {
        if (!title.trim()) return;
        const team = getTeam(teamId);
        const num = team.sops.length + 1;
        const newSop = {
            id: uid(),
            sopCode: `SOP-NEW`,
            title: title.trim(),
            objective: '목적을 입력하세요.',
            steps: [{ title: '작업 단계 1', desc: '설명을 입력하세요.' }],
            table: { title: '기준표', headers: ['구분', '내용'], rows: [['항목 1', '내용 1']] },
            attention: '주의사항을 입력하세요.'
        };
        team.sops.push(newSop);
        activeSopId = newSop.id;
        renderSidebar();
        renderContent();
        showToast('✅ SOP가 추가되었습니다.');
    });
}

function deleteSop(teamId, sopId) {
    const sop = getSop(teamId, sopId);
    if (!confirm(`"${sop.title}" SOP를 삭제하시겠습니까?`)) return;
    const team = getTeam(teamId);
    team.sops = team.sops.filter(s => s.id !== sopId);
    if (activeSopId === sopId) activeSopId = null;
    renderSidebar();
    renderContent();
    showToast('🗑 SOP가 삭제되었습니다.');
}

// ── 필드 저장 ──────────────────────────────────
function saveField(el, field, teamId, sopId, idx) {
    const sop = getSop(teamId, sopId);
    const val = el.innerText.trim();
    if (field === 'title') sop.title = val;
    else if (field === 'sopCode') sop.sopCode = val;
    else if (field === 'objective') sop.objective = val;
    else if (field === 'attention') sop.attention = val;
    else if (field === 'tableTitle') sop.table.title = val;
    else if (field === 'step-title') sop.steps[idx].title = val;
    else if (field === 'step-desc') sop.steps[idx].desc = val;
}

function saveTableHeader(el, teamId, sopId, colIdx) {
    const sop = getSop(teamId, sopId);
    sop.table.headers[colIdx] = el.innerText.trim();
}

function saveTableCell(el, teamId, sopId, rowIdx, colIdx) {
    const sop = getSop(teamId, sopId);
    sop.table.rows[rowIdx][colIdx] = el.innerText.trim();
}

// ── 스텝 추가/삭제 ────────────────────────────
function addStep(teamId, sopId) {
    const sop = getSop(teamId, sopId);
    sop.steps.push({ title: '새 작업 단계', desc: '설명을 입력하세요.' });
    renderContent();
    showToast('✅ 단계가 추가되었습니다.');
}

function deleteStep(teamId, sopId, idx) {
    const sop = getSop(teamId, sopId);
    sop.steps.splice(idx, 1);
    renderContent();
}

// ── 테이블 행/열 추가/삭제 ───────────────────
function addTableRow(teamId, sopId) {
    const sop = getSop(teamId, sopId);
    const cols = sop.table.headers.length;
    sop.table.rows.push(Array(cols).fill('내용 입력'));
    renderContent();
}

function addTableCol(teamId, sopId) {
    const sop = getSop(teamId, sopId);
    sop.table.headers.push('새 열');
    sop.table.rows.forEach(row => row.push(''));
    renderContent();
}

function deleteTableRow(teamId, sopId, rowIdx) {
    const sop = getSop(teamId, sopId);
    sop.table.rows.splice(rowIdx, 1);
    renderContent();
}

// ── 모달 ──────────────────────────────────────
function showModal(label, defaultVal, callback) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
        <div class="modal-box">
            <div class="text-sm font-bold text-slate-700 mb-3">${label}</div>
            <input type="text" id="modal-input" value="${defaultVal}" class="w-full mb-4" placeholder="입력하세요">
            <div class="flex gap-2 justify-end">
                <button onclick="this.closest('.modal-overlay').remove()" class="btn-ghost px-4 py-2">취소</button>
                <button id="modal-ok" class="btn-primary px-4 py-2">확인</button>
            </div>
        </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#modal-input');
    inp.focus(); inp.select();
    overlay.querySelector('#modal-ok').onclick = () => {
        overlay.remove();
        callback(inp.value);
    };
    inp.onkeydown = (e) => { if (e.key === 'Enter') { overlay.remove(); callback(inp.value); } };
}

// ── 화면 비율 자동 조정 ────────────────────────
function adjustScale() {
    const w = document.getElementById('main-wrapper');
    if (!w) return;
    const scaleX = window.innerWidth / 1280;
    const scaleY = window.innerHeight / 720;
    const scale = Math.min(scaleX, scaleY, 1);
    w.style.transform = `scale(${scale})`;
    w.style.transformOrigin = 'center center';
}
window.addEventListener('resize', adjustScale);

// ── Firestore 저장 ──────────────────────────────
window._saveToFirestore = async function() {
    if (typeof saveSOPToFirestore === 'function') {
        await saveSOPToFirestore();
    } else {
        showToast('저장 기능이 초기화되지 않았습니다.');
    }
};

// ── 초기화 ────────────────────────────────────
window.onload = function() {
    adjustScale();
    renderSidebar();
    renderContent();
};
</script>

<!-- Firebase 연동 -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot }
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDZviv3Nc1I4rL7VGhdEP9ozbupSu-R45I",
        authDomain: "laundrygo-sop.firebaseapp.com",
        projectId: "laundrygo-sop",
        storageBucket: "laundrygo-sop.firebasestorage.app",
        messagingSenderId: "244997131170",
        appId: "1:244997131170:web:1f70864631e02b5b8dc0fb"
    };

    const EDITOR_EMAILS = [
        "jykim@lifegoeson.kr",
        "cmyong@lifegoeson.kr",
        "bsyoon@lifegoeson.kr",
        "mschoi@lifegoeson.kr",
        "yjlim@lifegoeson.kr",
    ];

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // 로그인 모달
    const modal = document.createElement('div');
    modal.id = 'fb-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(13,33,55,0.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:9999;';
    modal.innerHTML = `
        <div style="background:#fff;border-radius:16px;padding:36px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;">
            <div style="width:52px;height:52px;background:#4f46e5;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
                <i class="fa-solid fa-industry" style="color:white;font-size:22px;"></i>
            </div>
            <h2 style="font-size:18px;font-weight:900;color:#0f172a;margin:0 0 4px;">런드리고 SOP</h2>
            <p style="font-size:12px;color:#94a3b8;margin:0 0 24px;">회사 Google 계정으로 로그인하세요</p>
            <div id="fb-login-screen">
                <button id="fb-google-btn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px;font-size:13px;font-weight:700;color:#374151;cursor:pointer;background:#fff;font-family:'Noto Sans KR',sans-serif;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px;height:18px;">
                    Google 계정으로 로그인
                </button>
                <p style="font-size:11px;color:#94a3b8;margin-top:16px;line-height:1.7;">로그인 후 접근 권한이 자동 확인됩니다.<br>권한이 없으면 관리자에게 문의하세요.</p>
            </div>
            <div id="fb-denied-screen" style="display:none;">
                <div style="width:48px;height:48px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
                    <i class="fa-solid fa-ban" style="color:#ef4444;font-size:20px;"></i>
                </div>
                <h3 style="font-weight:900;color:#0f172a;margin:0 0 8px;">접근 권한 없음</h3>
                <p id="fb-denied-msg" style="font-size:12px;color:#6b7280;margin:0 0 16px;line-height:1.6;"></p>
                <a id="fb-mail-link" href="#" style="display:inline-block;background:#4f46e5;color:#fff;font-size:12px;font-weight:700;padding:10px 20px;border-radius:10px;text-decoration:none;margin-bottom:10px;">권한 요청 메일 보내기</a><br>
                <button onclick="doLogin()" style="font-size:11px;color:#9ca3af;background:none;border:none;cursor:pointer;margin-top:6px;">다른 계정으로 시도</button>
            </div>
        </div>`;
    document.body.appendChild(modal);

    // 헤더 뱃지
    const badge = document.createElement('div');
    badge.style.cssText = 'display:none;align-items:center;gap:8px;';
    badge.innerHTML = `
        <span id="fb-role" style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#e0e7ff;color:#4f46e5;">👁 뷰어</span>
        <img id="fb-avatar" src="" style="width:26px;height:26px;border-radius:50%;border:2px solid #4f46e5;">
        <span id="fb-name" style="font-size:11px;color:#94a3b8;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
        <button onclick="doLogout()" style="font-size:13px;color:#64748b;background:none;border:none;cursor:pointer;" title="로그아웃"><i class="fa-solid fa-right-from-bracket"></i></button>`;
    document.getElementById('header-right').prepend(badge);

    async function checkAccess(email) {
        if (EDITOR_EMAILS.includes(email)) return true;
        try {
            const snap = await getDoc(doc(db, 'access', 'viewers'));
            return snap.exists() && (snap.data().emails || []).includes(email);
        } catch { return false; }
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            modal.style.display = 'flex';
            document.getElementById('fb-login-screen').style.display = '';
            document.getElementById('fb-denied-screen').style.display = 'none';
            badge.style.display = 'none';
            return;
        }
        const allowed = await checkAccess(user.email);
        if (!allowed) {
            await signOut(auth);
            document.getElementById('fb-login-screen').style.display = 'none';
            document.getElementById('fb-denied-screen').style.display = '';
            document.getElementById('fb-denied-msg').innerText = user.email + ' 계정은 열람 권한이 없습니다.';
            document.getElementById('fb-mail-link').href = `mailto:cmyong@lifegoeson.kr?subject=SOP 열람 권한 요청&body=이메일: ${user.email}`;
            return;
        }

        modal.style.display = 'none';
        badge.style.display = 'flex';
        document.getElementById('fb-name').innerText = user.displayName || user.email;
        document.getElementById('fb-avatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.email)}&background=4f46e5&color=fff`;

        const isEditor = EDITOR_EMAILS.includes(user.email);
        window._isEditor = isEditor;
        if (isEditor) {
            document.getElementById('fb-role').innerText = '✏️ 편집자';
            document.getElementById('fb-role').style.background = '#e0e7ff';
            document.getElementById('fb-role').style.color = '#4f46e5';
        } else {
            document.getElementById('edit-mode-btn').style.display = 'none';
        }

        // Firestore 로드
        try {
            const snap = await getDoc(doc(db, 'sop', 'main'));
            if (snap.exists() && snap.data().sopData && Array.isArray(snap.data().sopData)) {
                window.sopData = snap.data().sopData;
                renderSidebar();
                renderContent();
                showCustomToast('✅ 최신 SOP 데이터를 불러왔습니다.');
            } else {
                await setDoc(doc(db, 'sop', 'main'), { sopData: window.sopData, updatedAt: new Date().toISOString(), updatedBy: 'init' });
            }
        } catch(e) {
            console.error('Firestore 로드 오류:', e);
        }

        // 실시간 감지
        onSnapshot(doc(db, 'sop', 'main'), (snap) => {
            if (snap.exists() && snap.data().sopData && !window._isEditing) {
                window.sopData = snap.data().sopData;
                renderSidebar();
                renderContent();
            }
        });
    });

    // Firestore 저장
    window.saveSOPToFirestore = async function() {
        try {
            await setDoc(doc(db, 'sop', 'main'), {
                sopData: window.sopData,
                updatedAt: new Date().toISOString(),
                updatedBy: auth.currentUser?.email || 'unknown'
            });
            showCustomToast('✅ 저장 완료! 모든 사용자에게 즉시 반영됩니다.');
        } catch(e) {
            showCustomToast('⚠️ 저장 실패: ' + e.message);
        }
    };

    // 로그인/로그아웃
    window.doLogin = async function() {
        const btn = document.getElementById('fb-google-btn');
        btn.disabled = true; btn.innerHTML = '⏳ 로그인 중...';
        try { await signInWithPopup(auth, provider); }
        catch(e) {
            btn.disabled = false;
            btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px;height:18px;"> Google 계정으로 로그인';
        }
    };
    window.doLogout = async function() { await signOut(auth); };

    document.getElementById('fb-google-btn').onclick = () => window.doLogin();
</script>

</body>
